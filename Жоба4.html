<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мұғалімдердің келуін тіркеу жүйесі</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.container{
width:100%;
max-width:1200px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:25px;
padding:30px;
box-shadow:0 0 40px rgba(0,255,255,0.2);
}

h1{
text-align:center;
margin-bottom:25px;
font-size:32px;
color:#38bdf8;
}

.top-section{
display:grid;
grid-template-columns:1fr 1fr 1fr auto;
gap:15px;
margin-bottom:25px;
}

input,select{
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,0.1);
color:white;
font-size:16px;
}

option{
color:black;
}

button{
background:linear-gradient(45deg,#06b6d4,#3b82f6);
border:none;
padding:14px 25px;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:18px;
text-align:center;
}

.card h2{
font-size:28px;
margin-top:10px;
color:#38bdf8;
}

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:15px;
}

thead{
background:#0284c7;
}

th,td{
padding:15px;
text-align:center;
}

tbody tr{
background:rgba(255,255,255,0.05);
border-bottom:1px solid rgba(255,255,255,0.1);
}

tbody tr:hover{
background:rgba(255,255,255,0.1);
}

.delete-btn{
background:#ef4444;
padding:8px 15px;
font-size:14px;
}

.footer{
text-align:center;
margin-top:20px;
opacity:0.7;
}

@media(max-width:768px){

.top-section{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr 1fr;
}

table{
font-size:12px;
}

}
</style>
</head>
<body>

<div class="container">

<h1>📚 Мұғалімдердің келуін тіркеу жүйесі</h1>

<div class="top-section">
<input type="text" id="teacherName" placeholder="Мұғалімнің аты-жөні">

<select id="status">
<option>Келді</option>
<option>Кешікті</option>
<option>Себепті</option>
</select>

<input type="date" id="date">

<button onclick="addTeacher()">➕ Тіркеу</button>
</div>

<div class="stats">

<div class="card">
Барлығы
<h2 id="total">0</h2>
</div>

<div class="card">
Келді
<h2 id="arrived">0</h2>
</div>

<div class="card">
Кешікті
<h2 id="late">0</h2>
</div>

<div class="card">
Себепті
<h2 id="reason">0</h2>
</div>

</div>

<table>
<thead>
<tr>
<th>№</th>
<th>Аты-жөні</th>
<th>Күні</th>
<th>Уақыты</th>
<th>Статус</th>
<th>Әрекет</th>
</tr>
</thead>

<tbody id="tableBody">

</tbody>

</table>

<div class="footer">
© 2026 Мектеп әкімшілігі
</div>

</div>

<script>

document.getElementById("date").value =
new Date().toISOString().split('T')[0];

let teachers=[];

function addTeacher(){

const name=document.getElementById("teacherName").value;

const status=document.getElementById("status").value;

const date=document.getElementById("date").value;

if(name===""){
alert("Аты-жөнін енгізіңіз!");
return;
}

const now=new Date();

const time=now.toLocaleTimeString('kk-KZ');

teachers.push({
name,
status,
date,
time
});

document.getElementById("teacherName").value="";

renderTable();

}

function renderTable(){

const body=document.getElementById("tableBody");

body.innerHTML="";

teachers.forEach((teacher,index)=>{

body.innerHTML+=`
<tr>
<td>${index+1}</td>
<td>${teacher.name}</td>
<td>${teacher.date}</td>
<td>${teacher.time}</td>
<td>${teacher.status}</td>
<td>
<button class="delete-btn"
onclick="deleteTeacher(${index})">
🗑️ Жою
</button>
</td>
</tr>
`;

});

updateStats();

}

function deleteTeacher(index){
teachers.splice(index,1);
renderTable();
}

function updateStats(){

document.getElementById("total").innerText=
teachers.length;

document.getElementById("arrived").innerText=
teachers.filter(t=>t.status==="Келді").length;

document.getElementById("late").innerText=
teachers.filter(t=>t.status==="Кешікті").length;

document.getElementById("reason").innerText=
teachers.filter(t=>t.status==="Себепті").length;

}

</script>

</body>
</html>
